version: '3.8'

services:
  # Qdrant for Lightning-Fast Vector Retrieval (RAG)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    restart: unless-stopped
    container_name: nsd_qdrant

  # MongoDB for Long-Term Memory & Graph SSOT Storage
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo_storage:/data/db
    restart: unless-stopped
    container_name: nsd_mongodb